{% extends "base.html" %}

{% block body %}

<h2>👤 My Profile</h2>
<a href="{{ url_for('dashboard_student') }}" class="btn btn-outline-secondary btn-sm mb-3">Back to Dashboard</a>

<hr>

<form method="POST" enctype="multipart/form-data" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" value="{{ student.full_name }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ student.email }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ student.phone or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Department</label>
        <input type="text" name="department" class="form-control" value="{{ student.department or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">CGPA</label>
        <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Graduation Year</label>
        <input type="number" name="graduation_year" class="form-control" value="{{ student.graduation_year or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Resume (PDF)</label>
        {% if student.resume_file %}
            <p class="text-muted mb-1"><small>Current: {{ student.resume_file }}</small></p>
        {% endif %}
        <input type="file" name="resume" class="form-control" accept=".pdf">
    </div>
    <button type="submit" class="btn btn-primary">Save Profile</button>
</form>

{% endblock body %}
