{% extends "base.html" %}

{% block body %}
    <h1>Student Registration</h1>
    <p>Please fill in the details below to register as a student.</p>

    <form method="post" action="{{ url_for('student_register') }}">
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="college">College Name:</label><br>
        <input type="text" id="college" name="college"><br><br>

        <label for="course">Course:</label><br>
        <input type="text" id="course" name="course"><br><br>

        <label for="year">Year of Study:</label><br>
        <input type="number" id="year" name="year" min="1" max="6"><br><br>

        <input type="submit" value="Register">
    </form>

    <p>Already have an account? <a href="{{ url_for('student_login') }}">Login here</a></p>
{% endblock body %}
