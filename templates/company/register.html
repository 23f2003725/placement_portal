{% extends "base.html" %}

{% block body %}

<h2>🏢 Company Register</h2>
<p class="text-muted mb-4">Register your company to post placement drives.</p>

<form method="POST" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="company_name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">HR Contact</label>
        <input type="text" name="hr_contact" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="text" name="website" class="form-control" placeholder="https://www.example.com">
    </div>
    <button type="submit" class="btn btn-success">Register</button>
    <a href="{{ url_for('login_company') }}" class="btn btn-outline-secondary">Already registered? Login</a>
</form>

{% endblock body %}
