{% extends "base.html" %}

{% block body %}
    <h1>Company Registration</h1>
    <p>Please fill in the details below to register your company.</p>

    <form method="post" action="{{ url_for('company_register') }}">
        <label for="name">Company Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <label for="website">Website:</label><br>
        <input type="url" id="website" name="website" placeholder="http://" required><br><br>

        <input type="submit" value="Register">
    </form>

    <p>Already have an account? <a href="{{ url_for('company_login') }}">Login here</a></p>
{% endblock body %}
