{% extends "base.html" %}

{% block body %}
<h1>Company Register</h1>
<form method="POST">
    <label>Username</label><br>
    <input type="text" name="username" required><br><br>

    <label>Password</label><br>
    <input type="password" name="password" required><br><br>

    <label>Company Name</label><br>
    <input type="text" name="company_name" required><br><br>

    <label>Email</label><br>
    <input type="email" name="email" required><br><br>

    <label>HR Contact</label><br>
    <input type="text" name="hr_contact"><br><br>

    <label>Website</label><br>
    <input type="text" name="website" placeholder="https://www.example.com"><br><br>

    <button type="submit">Register</button>
</form>
<br>
<a href="{{ url_for('company_login') }}">Already registered? Login</a>
{% endblock body %}
