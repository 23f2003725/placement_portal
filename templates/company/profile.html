{% extends "base.html" %}

{% block body %}

<h2>🏢 Company Profile</h2>
<a href="{{ url_for('dashboard_company') }}" class="btn btn-outline-secondary btn-sm mb-3">Back to Dashboard</a>

<hr>

<form method="POST" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="company_name" class="form-control" value="{{ company.company_name }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ company.email }}">
    </div>
    <div class="mb-3">
        <label class="form-label">HR Contact</label>
        <input type="text" name="hr_contact" class="form-control" value="{{ company.hr_contact or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="text" name="website" class="form-control" value="{{ company.website or '' }}" placeholder="https://www.example.com">
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ company.description or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">Save</button>
</form>

{% endblock body %}
