{% extends "base.html" %}

{% block body %}

<h2>✏️ Edit Drive</h2>
<a href="{{ url_for('dashboard_company') }}" class="btn btn-outline-secondary btn-sm mb-3">Back to Dashboard</a>

<hr>

<form method="POST" style="max-width: 500px;">
    <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input type="text" name="job_title" class="form-control" value="{{ drive.job_title }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control">{{ drive.description or '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Eligibility</label>
        <textarea name="eligibility" class="form-control">{{ drive.eligibility or '' }}</textarea>
    </div>
    <div class="mb-3">
        <label class="form-label">Package</label>
        <input type="text" name="package" class="form-control" value="{{ drive.package or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control" value="{{ drive.location or '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Deadline</label>
        <input type="text" name="deadline" class="form-control" value="{{ drive.deadline or '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Update Drive</button>
</form>

{% endblock body %}
