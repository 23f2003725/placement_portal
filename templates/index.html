{% extends "base.html" %}

{% block body %}

<h1 class="mb-2">Welcome to Placement Portal</h1>
<p class="text-muted mb-4">Please select your role to continue.</p>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 text-center mb-3">
            <h5>🎓 Student</h5>
            <a href="{{ url_for('login_student') }}" class="btn btn-primary btn-sm mb-2">Login</a>
            <a href="{{ url_for('register_student') }}" class="btn btn-outline-primary btn-sm">Register</a>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 text-center mb-3">
            <h5>🏢 Company</h5>
            <a href="{{ url_for('login_company') }}" class="btn btn-success btn-sm mb-2">Login</a>
            <a href="{{ url_for('register_company') }}" class="btn btn-outline-success btn-sm">Register</a>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card p-3 text-center mb-3">
            <h5>🛠️ Admin</h5>
            <a href="{{ url_for('login_admin') }}" class="btn btn-danger btn-sm mb-2">Login</a>
        </div>
    </div>
</div>

{% endblock body %}
